<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PataCash Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-card">

    <h1>PataCash</h1>
    <p>Sign in to continue</p>

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button id="loginBtn">
        Login
    </button>

    <button id="signupBtn">
        Create Account
    </button>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
